ktor:
  application:
    modules:
      - pers.jamestang.components.SerializationKt.initializeSerialization
      - pers.jamestang.components.ComponentInitializerKt.componentInitializer
      - pers.jamestang.ApplicationKt.module
  deployment:
    port: 8080
jwt:
  domain: "https://jwt-provider-domain/"
  audience: "jwt-audience"
  realm: "ktor sample app"
postgres:
  url: ${POSTGRES_URL}
  user: ${POSTGRES_USER}
  password: ${POSTGRES_PASSWORD}